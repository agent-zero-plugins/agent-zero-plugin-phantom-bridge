<html>
<head>
    <title>Phantom Bridge</title>
    <script type="module" src="/plugins/phantom_bridge/webui/phantom-bridge-store.js"></script>
    <style>
        .pb { font-family: system-ui, -apple-system, sans-serif; color: inherit; }
        .pb-card { background: color-mix(in srgb, currentColor 8%, transparent); border: 1px solid color-mix(in srgb, currentColor 12%, transparent); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
        .pb-mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85em; }
        .pb-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .pb-dot-on { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
        .pb-dot-off { background: #64748b; }

        .pb-open-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px 20px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white; font-size: 1em; font-weight: 600;
            border: none; border-radius: 10px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .pb-open-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px #8b5cf633; }
        .pb-open-btn:active { transform: translateY(0); }
        .pb-open-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        .pb-start-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 12px 16px;
            background: #22c55e22; border: 1px solid #22c55e44;
            color: #22c55e; font-size: 0.9em; font-weight: 600;
            border-radius: 10px; cursor: pointer; transition: all 0.2s;
        }
        .pb-start-btn:hover { background: #22c55e33; }

        .pb-stop-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 10px 16px;
            background: #ef444422; border: 1px solid #ef444444;
            color: #ef4444; font-size: 0.85em; font-weight: 500;
            border-radius: 10px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
        }
        .pb-stop-btn:hover { background: #ef444433; }

        .pb-auth-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 0.85em; }
        .pb-auth-domain { font-weight: 600; }
        .pb-auth-status { font-size: 0.75em; opacity: 0.5; }
        .pb-section-title { font-size: 0.9em; font-weight: 600; margin-bottom: 8px; }
        .pb-empty { font-size: 0.8em; opacity: 0.4; font-style: italic; }

        /* Health state banners */
        .pb-banner { border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 0.82em; line-height: 1.5; }
        .pb-banner-warn  { background: #854d0e22; border: 1px solid #854d0e44; color: #fbbf24; }
        .pb-banner-error { background: #7f1d1d22; border: 1px solid #7f1d1d44; color: #f87171; }
        .pb-banner-healthy { display: none; }
        .pb-banner-hint { margin-top: 6px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9em; opacity: 0.85; white-space: pre-wrap; word-break: break-word; }
        .pb-doctor-btn { margin-top: 8px; background: transparent; border: 1px solid currentColor; color: inherit; font-size: 0.8em; padding: 4px 10px; border-radius: 6px; cursor: pointer; opacity: 0.75; }
        .pb-doctor-btn:hover { opacity: 1; }
    </style>
</head>
<body>
    <div x-data>
        <template x-if="$store.phantomBridge">
            <div class="pb" x-init="$store.phantomBridge.onOpen()" x-destroy="$store.phantomBridge.cleanup()">

                <!-- Header -->
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:16px;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
                        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                    <div>
                        <h2 style="margin:0; font-size:1.1em;">Phantom Bridge</h2>
                        <p style="margin:0; font-size:0.75em; opacity:0.5;">Log in once. A0 uses it forever.</p>
                    </div>
                    <div style="margin-left:auto; display:flex; align-items:center; gap:6px;">
                        <span class="pb-dot" :class="$store.phantomBridge.running ? 'pb-dot-on' : 'pb-dot-off'"></span>
                        <span style="font-size:0.8em;" x-text="$store.phantomBridge.running ? 'Bridge Open' : 'Offline'"></span>
                    </div>
                </div>

                <!-- Health state banner — hidden when healthy -->
                <template x-if="$store.phantomBridge.health_state !== 'healthy'">
                    <div class="pb-banner" :class="$store.phantomBridge.statusBanner().cls">
                        <strong x-text="$store.phantomBridge.statusBanner().text"></strong>
                        <template x-if="$store.phantomBridge.statusBanner().hint">
                            <div class="pb-banner-hint" x-text="$store.phantomBridge.statusBanner().hint"></div>
                        </template>
                        <button class="pb-doctor-btn"
                                @click="$store.a0.sendMessage('Run bridge_doctor')"
                                title="Ask A0 to run bridge_doctor for a full diagnostic">
                            Run bridge_doctor
                        </button>
                    </div>
                </template>

                <!-- Open Bridge Button (when running) -->
                <template x-if="$store.phantomBridge.running">
                    <div>
                        <button class="pb-open-btn" @click="$store.phantomBridge.openBridge()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            Open Bridge in Browser
                        </button>
                        <button class="pb-stop-btn" @click="$store.phantomBridge.stopBridge()">
                            Stop Bridge
                        </button>
                    </div>
                </template>

                <!-- Start Button (when not running) -->
                <template x-if="!$store.phantomBridge.running">
                    <button class="pb-start-btn" @click="$store.phantomBridge.startBridge()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                            <polygon points="5 3 19 12 5 21 5 3" fill="#22c55e"/>
                        </svg>
                        Start Bridge
                    </button>
                </template>

                <!-- Cookies / Authenticated Domains -->
                <div class="pb-card" style="margin-top: 12px;">
                    <div style="display:flex; align-items:center; justify-content:space-between;">
                        <div class="pb-section-title" style="margin-bottom:0;">
                            Authenticated Domains
                            <span class="pb-mono" style="opacity:0.4; font-weight:400;" x-text="'(' + $store.phantomBridge.cookieDomains.length + ' domains, ' + $store.phantomBridge.cookieTotal + ' cookies)'"></span>
                        </div>
                        <template x-if="$store.phantomBridge.cookieTotal > 0">
                            <button style="background:#ef444422; border:1px solid #ef444444; color:#ef4444; font-size:0.7em; padding:3px 10px; border-radius:6px; cursor:pointer;"
                                    @click="$store.phantomBridge.deleteAllCookies()">
                                Delete All
                            </button>
                        </template>
                    </div>
                    <template x-if="$store.phantomBridge.cookieDomains.length > 0">
                        <div style="margin-top:8px;">
                            <template x-for="entry in $store.phantomBridge.cookieDomains" :key="entry.domain">
                                <div class="pb-auth-item">
                                    <span class="pb-dot pb-dot-on"></span>
                                    <span class="pb-auth-domain" x-text="entry.domain"></span>
                                    <span class="pb-mono" style="opacity:0.4;" x-text="entry.count + ' cookies'"></span>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template x-if="$store.phantomBridge.cookieDomains.length === 0">
                        <p class="pb-empty" style="margin-top:8px;">No cookies yet. Open the bridge and log in.</p>
                    </template>
                </div>

                <!-- Learned Sitemaps -->
                <div class="pb-card">
                    <div class="pb-section-title">
                        Learned Sitemaps
                        <span class="pb-mono" style="opacity:0.4; font-weight:400;" x-text="'(' + $store.phantomBridge.sitemapCount + ' domains)'"></span>
                    </div>
                    <template x-if="$store.phantomBridge.sitemapCount === 0">
                        <p class="pb-empty">Browse sites with the bridge open — URL patterns appear here.</p>
                    </template>
                    <template x-if="$store.phantomBridge.sitemapCount > 0">
                        <div>
                            <template x-for="sm in $store.phantomBridge.sitemapEntries" :key="sm.domain">
                                <div class="pb-auth-item">
                                    <span style="font-weight:600;" x-text="sm.domain"></span>
                                    <span class="pb-mono" style="opacity:0.4;" x-text="sm.features + ' features'"></span>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- Playbooks -->
                <div class="pb-card">
                    <div class="pb-section-title">
                        Saved Playbooks
                        <span class="pb-mono" style="opacity:0.4; font-weight:400;" x-text="'(' + $store.phantomBridge.playbookCount + ')'"></span>
                    </div>
                    <template x-if="$store.phantomBridge.playbookCount === 0">
                        <p class="pb-empty">Tell A0 "record this" while browsing to save replayable workflows.</p>
                    </template>
                    <template x-if="$store.phantomBridge.playbookCount > 0">
                        <div>
                            <template x-for="pb in $store.phantomBridge.playbooks" :key="pb.name">
                                <div style="display:flex; align-items:center; gap:8px; padding:6px 0; font-size:0.85em;">
                                    <span style="font-weight:600; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis;" x-text="pb.name"></span>
                                    <span class="pb-mono" style="opacity:0.4; white-space:nowrap;" x-text="pb.steps + ' steps'"></span>
                                    <button style="background:#6366f122; border:1px solid #6366f144; color:#a78bfa; font-size:0.75em; padding:3px 8px; border-radius:5px; cursor:pointer; white-space:nowrap;"
                                            @click="$store.phantomBridge.replayPlaybook(pb.name)"
                                            title="Replay this workflow">
                                        ▶ Play
                                    </button>
                                    <button style="background:#ef444422; border:1px solid #ef444444; color:#ef4444; font-size:0.75em; padding:3px 8px; border-radius:5px; cursor:pointer;"
                                            @click="$store.phantomBridge.deletePlaybook(pb.name)"
                                            title="Delete this playbook">
                                        ✕
                                    </button>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- How it works -->
                <div class="pb-card" style="font-size:0.8em; opacity:0.6;">
                    <p style="margin:0; line-height:1.4;">
                        <strong>How it works:</strong>
                        Click "Open Bridge" to control A0's Chromium from your machine.
                        Log into any service — Google, X, NotebookLM, OpenTable.
                        A0 inherits those sessions and can use them with browser_agent.
                        Tell A0 to "record this" while browsing to teach it workflows
                        it can replay autonomously later.
                    </p>
                </div>

                <!-- noVNC connection info -->
                <template x-if="$store.phantomBridge.running">
                    <div class="pb-card" style="font-size:0.8em; opacity:0.5;">
                        <p style="margin:0;">
                            <span class="pb-mono" x-text="'noVNC: ' + (location.hostname || 'localhost') + ':' + $store.phantomBridge.novncPort"></span>
                        </p>
                    </div>
                </template>

            </div>
        </template>
    </div>
</body>
</html>
