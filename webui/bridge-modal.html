<!--
  Phantom Bridge -- In-app draggable browser modal
  Embeds noVNC (native control) with screencast fallback
  Injected via chat-input button → modal toggle
-->

<div id="pb-modal" style="display:none;">
  <!-- Title Bar (drag handle) -->
  <div id="pb-titlebar">
    <div id="pb-titlebar-left">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span id="pb-title">Phantom Bridge</span>
      <span id="pb-mode-tag"></span>
      <button class="pb-titlebar-btn" id="pb-btn-record" title="Record workflow" style="display:none;">
        <svg width="12" height="12" viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" fill="#ef4444"/></svg>
      </button>
      <button class="pb-titlebar-btn" id="pb-btn-stop-record" title="Stop recording" style="display:none;">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1" fill="#ef4444"/></svg>
      </button>
    </div>
    <div id="pb-titlebar-right">
      <button class="pb-titlebar-btn" id="pb-btn-popout" title="Open in new tab">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="pb-titlebar-btn" id="pb-btn-minimize" title="Minimize to icon">
        <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <button class="pb-titlebar-btn pb-btn-close" id="pb-btn-close" title="Close">&times;</button>
    </div>
  </div>

  <!-- Body -->
  <div id="pb-body">
    <!-- Loading state -->
    <div id="pb-loading">
      <div class="pb-spinner"></div>
      <span>Connecting to bridge...</span>
    </div>

    <!-- noVNC RFB mount target (primary) — same-origin wss via /vnc_proxy -->
    <div id="pb-vnc-frame" style="display:none;"></div>

    <!-- Screencast canvas (fallback) -->
    <div id="pb-sc-container" style="display:none;" tabindex="0">
      <canvas id="pb-sc-canvas" width="1280" height="900"></canvas>
      <div id="pb-kb-hint">Click to type. Escape to release.</div>
    </div>
  </div>

  <!-- Resize handle -->
  <div id="pb-resize-handle">
    <svg width="12" height="12" viewBox="0 0 12 12">
      <circle cx="9" cy="3" r="1" fill="rgba(255,255,255,0.25)"/>
      <circle cx="5" cy="7" r="1" fill="rgba(255,255,255,0.25)"/>
      <circle cx="9" cy="7" r="1" fill="rgba(255,255,255,0.25)"/>
      <circle cx="9" cy="11" r="1" fill="rgba(255,255,255,0.25)"/>
    </svg>
  </div>
</div>

<style>
  #pb-modal {
    position: fixed; z-index: 2500;
    width: 960px; height: 680px; min-width: 480px; min-height: 380px;
    bottom: 24px; right: 24px;
    background: var(--color-background, #1c1c1e);
    border: 1px solid var(--color-border, rgba(255,255,255,0.1));
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: flex; flex-direction: column; overflow: hidden;
    font-family: "Rubik", Arial, Helvetica, sans-serif;
    color: var(--color-text, rgba(255,255,255,0.87));
    user-select: none;
  }

  #pb-titlebar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.45rem 0.8rem;
    background: var(--color-background, #1c1c1e);
    border-bottom: 1px solid var(--color-border, rgba(255,255,255,0.1));
    cursor: grab; flex-shrink: 0;
  }
  #pb-titlebar:active { cursor: grabbing; }
  #pb-titlebar-left { display: flex; align-items: center; gap: 8px; }
  #pb-titlebar-right { display: flex; align-items: center; gap: 4px; }

  #pb-title {
    font-size: 0.85rem; font-weight: 600;
    color: var(--color-primary, #6366f1);
    white-space: nowrap;
  }
  #pb-mode-tag {
    font-size: 0.65rem; padding: 1px 6px; border-radius: 4px;
    background: rgba(99,102,241,0.15); color: #a5b4fc;
  }
  #pb-mode-tag:empty { display: none; }

  .pb-titlebar-btn {
    background: none; border: none;
    color: var(--color-text, rgba(255,255,255,0.6));
    cursor: pointer; padding: 4px 6px; border-radius: 4px;
    font-size: 14px; line-height: 1; opacity: 0.5;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .pb-titlebar-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }
  .pb-btn-close { font-size: 18px; }
  .pb-btn-close:hover { color: var(--color-accent, #e74c3c); }

  #pb-body {
    display: flex; flex-direction: column; flex: 1;
    min-height: 0; overflow: hidden; position: relative;
    background: #0d0d0f;
  }

  #pb-vnc-frame {
    flex: 1; width: 100%; border: none; background: #0d0d0f;
  }

  #pb-sc-container {
    flex: 1; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    outline: none;
  }
  #pb-sc-container:focus { box-shadow: inset 0 0 0 2px rgba(99,102,241,0.4); }
  #pb-sc-canvas { max-width: 100%; max-height: 100%; cursor: pointer; }

  #pb-loading {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; font-size: 0.8rem; color: rgba(255,255,255,0.3);
  }
  .pb-spinner {
    width: 28px; height: 28px;
    border: 2px solid rgba(99,102,241,0.15);
    border-top-color: rgba(99,102,241,0.6);
    border-radius: 50%;
    animation: pb-spin 0.8s linear infinite;
  }
  @keyframes pb-spin { to { transform: rotate(360deg); } }

  #pb-kb-hint {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    font-size: 0.7rem; color: rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4); padding: 3px 10px; border-radius: 10px;
    pointer-events: none;
  }
  #pb-sc-container:focus #pb-kb-hint { display: none; }

  #pb-resize-handle {
    position: absolute; bottom: 0; right: 0;
    width: 16px; height: 16px; cursor: nwse-resize; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.15; transition: opacity 0.2s;
  }
  #pb-resize-handle:hover { opacity: 0.4; }
</style>

<script>
(function() {
  var modal      = document.getElementById("pb-modal");
  var titlebar   = document.getElementById("pb-titlebar");
  var btnClose   = document.getElementById("pb-btn-close");
  var btnMin     = document.getElementById("pb-btn-minimize");
  var btnPopout  = document.getElementById("pb-btn-popout");
  var btnRecord  = document.getElementById("pb-btn-record");
  var btnStopRec = document.getElementById("pb-btn-stop-record");
  var loadingEl  = document.getElementById("pb-loading");
  var vncFrame   = document.getElementById("pb-vnc-frame");
  var scContainer= document.getElementById("pb-sc-container");
  var scCanvas   = document.getElementById("pb-sc-canvas");
  var modeTag    = document.getElementById("pb-mode-tag");
  var resizeHandle = document.getElementById("pb-resize-handle");

  var mode = null; // 'vnc' | 'screencast'
  var novncPort = 6080;
  var preMinimizeRect = null;
  var isDragging = false, isResizing = false;
  var dragOffsetX = 0, dragOffsetY = 0;
  var scPollTimer = null;
  var kbActive = false;
  var isRecording = false;

  var _callJsonApi = null;
  async function getApi() {
    if (!_callJsonApi) { var m = await import("/js/api.js"); _callJsonApi = m.callJsonApi; }
    return _callJsonApi;
  }
  async function api(endpoint, body) {
    var fn = await getApi();
    return fn("plugins/phantom_bridge/" + endpoint, body || {});
  }

  // ── Show / Hide ──
  function show() {
    if (preMinimizeRect) {
      modal.style.top = preMinimizeRect.top + "px";
      modal.style.left = preMinimizeRect.left + "px";
      modal.style.bottom = "auto"; modal.style.right = "auto";
      modal.style.width = preMinimizeRect.width + "px";
      modal.style.height = preMinimizeRect.height + "px";
    }
    modal.style.display = "flex";
    globalThis._phantomBridgeModalVisible = true;
    connectViewer();
  }

  function hide() {
    modal.style.display = "none";
    globalThis._phantomBridgeModalVisible = false;
    stopScreencast();
    _disconnectVnc();
  }

  function minimize() {
    if (modal.style.display !== "none") {
      var rect = modal.getBoundingClientRect();
      preMinimizeRect = { top: rect.top, left: rect.left, width: rect.width, height: rect.height };
    }
    modal.style.display = "none";
    globalThis._phantomBridgeModalVisible = false;
  }

  // ── Recording ──
  function showRecordButtons() { btnRecord.style.display = "flex"; }
  function hideRecordButtons() { btnRecord.style.display = "none"; btnStopRec.style.display = "none"; }

  btnRecord.addEventListener("click", async function(e) {
    e.stopPropagation();
    var name = prompt("Name this workflow (e.g. post_tweet, export_report):");
    if (!name) return;
    try {
      await api("bridge", { action: "record_start", name: name });
      isRecording = true;
      btnRecord.style.display = "none";
      btnStopRec.style.display = "flex";
      modeTag.textContent = "REC";
      modeTag.style.background = "rgba(239,68,68,0.2)";
      modeTag.style.color = "#fca5a5";
    } catch(err) {
      alert("Failed to start recording: " + (err.message || err));
    }
  });

  btnStopRec.addEventListener("click", async function(e) {
    e.stopPropagation();
    try {
      var result = await api("bridge", { action: "record_stop" });
      isRecording = false;
      btnStopRec.style.display = "none";
      btnRecord.style.display = "flex";
      modeTag.textContent = "";
      modeTag.style.background = "";
      modeTag.style.color = "";
      if (result && result.ok) {
        alert("Playbook saved: " + (result.name || "unnamed") + " (" + (result.steps || 0) + " steps)");
      }
    } catch(err) {
      alert("Failed to stop recording: " + (err.message || err));
    }
  });

  // ── Connect viewer ──
  // noVNC RFB client (lazy-loaded from CDN, bundled build)
  var rfb = null;
  async function _loadRFB() {
    var urls = [
      "https://esm.sh/@novnc/novnc@1.7.0/core/rfb.js",
      "https://cdn.jsdelivr.net/npm/@novnc/novnc@1.7.0/+esm"
    ];
    var lastErr = null;
    for (var i = 0; i < urls.length; i++) {
      try { var m = await import(urls[i]); return m.default || m.RFB || m; }
      catch(e) { lastErr = e; }
    }
    throw lastErr || new Error("noVNC RFB failed to load");
  }

  function _disconnectVnc() {
    if (rfb) { try { rfb.disconnect(); } catch(e) {} rfb = null; }
    if (vncFrame) vncFrame.innerHTML = "";
  }

  async function connectViewer() {
    loadingEl.style.display = "flex";
    vncFrame.style.display = "none";
    scContainer.style.display = "none";
    _disconnectVnc();
    stopScreencast();

    // Get bridge status (confirms bridge + websockify are up)
    var novncRunning = false;
    try {
      var status = await api("bridge", { action: "status" });
      novncPort = status.novnc_port || 6080;
      novncRunning = !!status.novnc_running;
    } catch(e) {}

    // Primary: noVNC RFB over SAME-ORIGIN wss:// — relayed by the plugin's
    // /vnc_proxy ASGI route to internal websockify (no mixed content, no extra port).
    try {
      var RFB = await _loadRFB();
      var proto = (location.protocol === "https:") ? "wss" : "ws";
      var wsUrl = proto + "://" + location.host + "/vnc_proxy";
      vncFrame.style.display = "block";
      rfb = new RFB(vncFrame, wsUrl, {});
      rfb.viewOnly = false;
      rfb.scaleViewport = true;
      rfb.resizeSession = false;
      var settled = false;
      await new Promise(function(resolve, reject) {
        var to = setTimeout(function(){ if(!settled){ settled=true; reject(new Error("vnc connect timeout")); } }, 8000);
        rfb.addEventListener("connect", function(){ if(!settled){ settled=true; clearTimeout(to); resolve(); } });
        rfb.addEventListener("disconnect", function(ev){
          if(!settled){ settled=true; clearTimeout(to); reject(new Error("vnc disconnected")); }
        });
      });
      mode = "vnc";
      modeTag.textContent = "noVNC";
      modeTag.style.background = "";
      modeTag.style.color = "";
      loadingEl.style.display = "none";
      showRecordButtons();
      return;
    } catch(e) {
      _disconnectVnc();
      vncFrame.style.display = "none";
    }

    // Fallback: screencast (CDP JPEG poll over the same-origin API)
    mode = "screencast";
    modeTag.textContent = "Screencast";
    modeTag.style.background = "";
    modeTag.style.color = "";
    scContainer.style.display = "flex";
    loadingEl.style.display = "none";
    startScreencast();
    showRecordButtons();
  }

  // ── Screencast ──
  function startScreencast() {
    var ctx = scCanvas.getContext("2d");
    var img = new Image();

    async function poll() {
      try {
        var data = await api("screencast", { action: "frame" });
        if (data.ok && data.frame) {
          img.onload = function() {
            scCanvas.width = img.naturalWidth;
            scCanvas.height = img.naturalHeight;
            ctx.drawImage(img, 0, 0);
          };
          img.src = "data:image/jpeg;base64," + data.frame;
        }
      } catch(e) {}
      scPollTimer = setTimeout(poll, 80);
    }
    poll();
  }

  function stopScreencast() {
    if (scPollTimer) { clearTimeout(scPollTimer); scPollTimer = null; }
  }

  // ── Screencast input ──
  scContainer.addEventListener("click", async function(e) {
    var rect = scCanvas.getBoundingClientRect();
    var x = Math.round((e.clientX - rect.left) * (scCanvas.width / rect.width));
    var y = Math.round((e.clientY - rect.top) * (scCanvas.height / rect.height));
    scContainer.focus();
    kbActive = true;
    await api("screencast", { action: "click", x: x, y: y });
  });

  scContainer.addEventListener("keydown", async function(e) {
    if (!kbActive) return;
    if (e.key === "Escape") { kbActive = false; scContainer.blur(); return; }
    if ((e.ctrlKey || e.metaKey) && "twnlr".includes(e.key.toLowerCase())) return;
    e.preventDefault(); e.stopPropagation();
    await api("screencast", {
      action: "key", key: e.key, code: e.code,
      text: e.key.length === 1 ? e.key : "",
      modifiers: { alt: e.altKey, ctrl: e.ctrlKey, meta: e.metaKey, shift: e.shiftKey }
    });
  });

  scContainer.addEventListener("keyup", function(e) {
    if (kbActive) { e.preventDefault(); e.stopPropagation(); }
  });

  // ── Popout ──
  btnPopout.addEventListener("click", function(e) {
    e.stopPropagation();
    // Same-origin standalone viewer (served by the plugin) — avoids mixed content.
    var url = location.origin + "/plugins/phantom_bridge/webui/bridge.html";
    window.open(url, "phantom-bridge");
  });

  // ── Buttons ──
  btnMin.addEventListener("click", function(e) { e.stopPropagation(); minimize(); });
  btnClose.addEventListener("click", function(e) { e.stopPropagation(); hide(); });

  // ── Drag ──
  titlebar.addEventListener("mousedown", function(e) {
    if (e.target.closest("#pb-titlebar-right")) return;
    isDragging = true;
    var rect = modal.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    modal.style.top = rect.top + "px"; modal.style.left = rect.left + "px";
    modal.style.bottom = "auto"; modal.style.right = "auto";
    e.preventDefault();
  });

  document.addEventListener("mousemove", function(e) {
    if (isDragging) {
      modal.style.left = Math.max(0, Math.min(e.clientX - dragOffsetX, window.innerWidth - 100)) + "px";
      modal.style.top = Math.max(0, Math.min(e.clientY - dragOffsetY, window.innerHeight - 40)) + "px";
      e.preventDefault();
    }
    if (isResizing) {
      var rect = modal.getBoundingClientRect();
      modal.style.width = Math.max(480, e.clientX - rect.left) + "px";
      modal.style.height = Math.max(380, e.clientY - rect.top) + "px";
      e.preventDefault();
    }
  });

  document.addEventListener("mouseup", function() { isDragging = false; isResizing = false; });

  // ── Resize ──
  resizeHandle.addEventListener("mousedown", function(e) {
    isResizing = true;
    var rect = modal.getBoundingClientRect();
    modal.style.top = rect.top + "px"; modal.style.left = rect.left + "px";
    modal.style.bottom = "auto"; modal.style.right = "auto";
    e.preventDefault(); e.stopPropagation();
  });

  // ── Global toggle ──
  globalThis._phantomBridgeModalToggle = async function() {
    if (modal.style.display === "none" || modal.style.display === "") {
      try {
        var status = await api("bridge", { action: "status" });
        if (!status.running) {
          if (globalThis.toast) globalThis.toast("Starting Phantom Bridge...", "info");
          await api("bridge", { action: "start" });
          await new Promise(function(r) { setTimeout(r, 3000); });
          if (globalThis.toast) globalThis.toast("Bridge is live!", "success");
        }
      } catch(e) {
        if (globalThis.toast) globalThis.toast("Bridge error: " + e.message, "error");
        return;
      }
      show();
    } else {
      hide();
    }
  };

  globalThis._phantomBridgeModalVisible = false;
})();
</script>
