<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Bridge</title>
    <script type="module" src="/plugins/phantom_bridge/webui/phantom-bridge-store.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f0f; color: #e0e0e0;
            height: 100vh; display: flex; flex-direction: column;
        }

        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px;
            background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }
        .header h1 { font-size: 1em; font-weight: 600; }
        .header .status {
            margin-left: auto; font-size: 0.8em;
            display: flex; align-items: center; gap: 6px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-on { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
        .dot-off { background: #666; }
        .mode-tag {
            font-size: 0.7em; padding: 2px 8px; border-radius: 4px;
            background: #6366f122; color: #a5b4fc;
        }

        .vnc-frame { flex: 1; border: none; width: 100%; background: #0f0f0f; }

        .sc-container {
            flex: 1; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: #0a0a0a;
        }
        .sc-container canvas {
            max-width: 100%; max-height: 100%;
            cursor: pointer;
        }
        .sc-container.keyboard-active { outline: 2px solid #6366f1; outline-offset: -2px; }

        .kb-hint {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            background: #6366f1cc; color: white; padding: 4px 14px; border-radius: 6px;
            font-size: 0.75em; pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        .keyboard-active .kb-hint { opacity: 1; }

        .connecting {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 0.9em; opacity: 0.5;
        }
        .upgrade-bar {
            padding: 6px 20px; font-size: 0.72em; opacity: 0.4;
            text-align: center; background: #151515; border-top: 1px solid #2a2a2a;
        }
        .upgrade-bar a { color: #a5b4fc; text-decoration: none; }

        /* Replay toolbar */
        .replay-toolbar {
            position: fixed; top: 56px; right: 16px; z-index: 100;
            width: 260px; max-height: calc(100vh - 80px);
            background: #1a1a1aee; border: 1px solid #2a2a2a;
            border-radius: 10px; backdrop-filter: blur(12px);
            font-size: 0.85em; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        .replay-toolbar.collapsed {
            width: auto; max-height: none;
        }
        .replay-toggle {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; cursor: pointer;
            border-bottom: 1px solid #2a2a2a;
            user-select: none;
        }
        .replay-toggle:hover { background: #ffffff08; }
        .replay-toggle .arrow {
            margin-left: auto; font-size: 0.7em; opacity: 0.4;
            transition: transform 0.2s;
        }
        .replay-toggle .arrow.open { transform: rotate(180deg); }
        .replay-body {
            overflow-y: auto; padding: 8px 0;
            max-height: 320px;
        }
        .replay-item {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 14px; cursor: default;
        }
        .replay-item:hover { background: #ffffff06; }
        .replay-item-info { flex: 1; min-width: 0; }
        .replay-item-name {
            font-weight: 600; font-size: 0.9em;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .replay-item-meta {
            font-size: 0.75em; opacity: 0.4;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .replay-btn {
            flex-shrink: 0; padding: 4px 12px;
            background: #6366f122; border: 1px solid #6366f144;
            color: #a5b4fc; border-radius: 6px; cursor: pointer;
            font-size: 0.8em; font-weight: 600;
            transition: background 0.15s;
        }
        .replay-btn:hover { background: #6366f133; }
        .replay-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .replay-btn.running {
            background: #22c55e22; border-color: #22c55e44; color: #22c55e;
        }
        .replay-btn.error {
            background: #ef444422; border-color: #ef444444; color: #ef4444;
        }
        .replay-empty {
            padding: 16px 14px; font-size: 0.8em; opacity: 0.3;
            font-style: italic; text-align: center;
        }
    </style>
</head>
<body>
    <div x-data="bridgeViewer()" x-init="init()">

        <div class="header">
            <svg width="20" height="22" viewBox="0 0 24 28" fill="none">
                <path d="M12 0L7.5 5.5 6 8.5l-.5 4 1 3.5-1.5 3L4 22l3.5-1L9 24h2.5l.5-1 .5 1H15l1.5-3 3.5 1-1-2.5-1.5-3 1-3.5L18 8.5 16.5 5.5 12 0z" fill="#6366f1"/>
                <path d="M8.5 10.5l3-1-.6 1.8-2.4-.8z" fill="white" opacity="0.95"/>
                <path d="M15.5 10.5l-3-1 .6 1.8 2.4-.8z" fill="white" opacity="0.95"/>
            </svg>
            <h1>Phantom Bridge</h1>
            <template x-if="mode">
                <span class="mode-tag" x-text="mode === 'vnc' ? 'noVNC' : 'Screencast'"></span>
            </template>
            <div class="status">
                <span class="dot" :class="connected ? 'dot-on' : 'dot-off'"></span>
                <span x-text="connected ? 'Connected' : 'Connecting...'"></span>
            </div>
        </div>

        <!-- noVNC mode -->
        <template x-if="mode === 'vnc'">
            <iframe class="vnc-frame" :src="vncUrl" allow="clipboard-read; clipboard-write"></iframe>
        </template>

        <!-- Screencast mode -->
        <template x-if="mode === 'screencast'">
            <div class="sc-container" :class="{ 'keyboard-active': kbActive }"
                 tabindex="0"
                 @click="handleClick($event)"
                 @focus="kbActive = true"
                 @blur="kbActive = false"
                 @keydown.prevent="handleKey($event)"
                 @keyup.prevent="">
                <canvas x-ref="canvas" width="1280" height="900"></canvas>
                <div class="kb-hint">Typing active — Escape to release</div>
            </div>
        </template>

        <!-- Connecting -->
        <template x-if="!mode">
            <div class="connecting">Connecting to bridge...</div>
        </template>

        <!-- Upgrade hint (screencast mode only) -->
        <template x-if="mode === 'screencast'">
            <div class="upgrade-bar">
                Screencast mode (works out of the box).
                For full native control, add <code>"6080:6080"</code> to docker-compose and restart.
            </div>
        </template>

        <!-- Replay toolbar overlay -->
        <template x-if="connected">
            <div class="replay-toolbar" :class="{ collapsed: !replayOpen }">
                <div class="replay-toggle" @click="replayOpen = !replayOpen">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    <span style="font-weight:600;">Playbooks</span>
                    <template x-if="playbooks.length > 0">
                        <span style="font-size:0.75em; opacity:0.4;" x-text="'(' + playbooks.length + ')'"></span>
                    </template>
                    <span class="arrow" :class="{ open: replayOpen }">&#9660;</span>
                </div>
                <template x-if="replayOpen">
                    <div class="replay-body">
                        <template x-if="playbooks.length === 0">
                            <div class="replay-empty">No saved playbooks yet.</div>
                        </template>
                        <template x-for="pb in playbooks" :key="pb.name">
                            <div class="replay-item">
                                <div class="replay-item-info">
                                    <div class="replay-item-name" x-text="pb.name"></div>
                                    <div class="replay-item-meta" x-text="pb.domain + ' — ' + pb.steps + ' steps'"></div>
                                </div>
                                <button class="replay-btn"
                                        :class="{ running: replayStatus[pb.name] === 'running', error: replayStatus[pb.name] === 'error' }"
                                        :disabled="replayStatus[pb.name] === 'running'"
                                        @click="triggerReplay(pb.name)"
                                        x-text="replayLabel(pb.name)">
                                </button>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </template>

    </div>

    <script type="module">
        import { callJsonApi } from "/js/api.js";

        window.bridgeViewer = function() {
            return {
                mode: null,       // 'vnc' | 'screencast'
                connected: false,
                vncUrl: '',
                kbActive: false,
                _pollId: null,
                replayOpen: false,
                playbooks: [],
                replayStatus: {},  // { name: 'idle' | 'running' | 'done' | 'error' }

                async init() {
                    // Step 1: Check bridge status
                    const status = await callJsonApi("plugins/phantom_bridge/bridge", { action: "status" });
                    if (!status.running) {
                        // Start the bridge
                        await callJsonApi("plugins/phantom_bridge/bridge", { action: "start" });
                        await new Promise(r => setTimeout(r, 2500));
                    }

                    // Fetch playbooks
                    this.fetchPlaybooks();

                    // Step 2: Try noVNC first (requires port 6080 exposed)
                    const novncPort = status.novnc_port || 6080;
                    const vncTestUrl = `http://${location.hostname}:${novncPort}/vnc.html`;
                    try {
                        await fetch(vncTestUrl, { mode: 'no-cors', signal: AbortSignal.timeout(2000) });
                        // noVNC is reachable
                        this.mode = 'vnc';
                        this.vncUrl = vncTestUrl + '?autoconnect=true&resize=scale&reconnect=true';
                        this.connected = true;
                        return;
                    } catch (e) {
                        // noVNC not reachable — use screencast
                    }

                    // Step 3: Fall back to screencast (zero config)
                    this.mode = 'screencast';
                    this.connected = true;
                    await this.$nextTick;
                    this.startScreencastLoop();
                },

                startScreencastLoop() {
                    const canvas = this.$refs.canvas;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    const img = new Image();

                    let polling = true;
                    const poll = async () => {
                        if (!polling) return;
                        try {
                            const data = await callJsonApi("plugins/phantom_bridge/screencast", { action: "frame" });
                            if (data.ok && data.frame) {
                                img.onload = () => {
                                    canvas.width = img.naturalWidth;
                                    canvas.height = img.naturalHeight;
                                    ctx.drawImage(img, 0, 0);
                                };
                                img.src = "data:image/jpeg;base64," + data.frame;
                            }
                        } catch (e) {}
                        this._pollId = setTimeout(poll, 80);  // ~12fps
                    };
                    poll();
                },

                async handleClick(event) {
                    const canvas = this.$refs.canvas;
                    if (!canvas) return;
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    const x = Math.round((event.clientX - rect.left) * scaleX);
                    const y = Math.round((event.clientY - rect.top) * scaleY);

                    this.kbActive = true;
                    await callJsonApi("plugins/phantom_bridge/screencast", {
                        action: "click", x, y
                    });
                },

                async handleKey(event) {
                    if (!this.kbActive) return;
                    if (event.key === 'Escape') { this.kbActive = false; return; }
                    if ((event.ctrlKey || event.metaKey) && ['t','w','n','l','r'].includes(event.key.toLowerCase())) return;

                    await callJsonApi("plugins/phantom_bridge/screencast", {
                        action: "key",
                        key: event.key,
                        code: event.code,
                        text: event.key.length === 1 ? event.key : "",
                        modifiers: {
                            alt: event.altKey, ctrl: event.ctrlKey,
                            meta: event.metaKey, shift: event.shiftKey,
                        },
                    });
                },

                async fetchPlaybooks() {
                    try {
                        const data = await callJsonApi("plugins/phantom_bridge/bridge", { action: "playbooks" });
                        this.playbooks = data.playbooks || [];
                    } catch (e) {}
                },

                replayLabel(name) {
                    const s = this.replayStatus[name];
                    if (s === 'running') return 'Running...';
                    if (s === 'done') return 'Done';
                    if (s === 'error') return 'Error';
                    return 'Replay';
                },

                async triggerReplay(name) {
                    this.replayStatus[name] = 'running';
                    try {
                        const result = await callJsonApi("plugins/phantom_bridge/bridge", {
                            action: "replay", name
                        });
                        if (result.ok) {
                            // Replay started in background — mark done after estimated time
                            const steps = result.steps || 1;
                            const estimateMs = Math.max(steps * 2000, 3000);
                            setTimeout(() => {
                                this.replayStatus[name] = 'done';
                                setTimeout(() => { this.replayStatus[name] = null; }, 4000);
                            }, estimateMs);
                        } else {
                            this.replayStatus[name] = 'error';
                            setTimeout(() => { this.replayStatus[name] = null; }, 4000);
                        }
                    } catch (e) {
                        this.replayStatus[name] = 'error';
                        setTimeout(() => { this.replayStatus[name] = null; }, 4000);
                    }
                },

                destroy() {
                    if (this._pollId) clearTimeout(this._pollId);
                }
            };
        };
    </script>
</body>
</html>
