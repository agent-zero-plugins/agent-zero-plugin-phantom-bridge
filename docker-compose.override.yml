# Phantom Bridge — docker-compose.override.yml
#
# DROP-IN: copy this file next to your existing docker-compose.yml.
# Docker Compose auto-merges override files — your original compose stays untouched.
#
# What this adds to your A0 stack:
#   - Exposes port 6080 for the noVNC remote browser viewer
#   - Mounts ./a0-data/usr/plugins/phantom_bridge into the container so the
#     plugin loads on the next start
#
# Install (3 commands once you have A0 running):
#
#   git clone https://github.com/notabotchef/phantom-bridge.git \
#     ./a0-data/usr/plugins/phantom_bridge
#   curl -O https://raw.githubusercontent.com/notabotchef/phantom-bridge/main/docker-compose.override.yml
#   docker compose up -d
#
# Then open A0 (http://localhost:5050) → Plugins → click "Execute" on
# Phantom Bridge. That runs execute.py inside the container, which
# installs x11vnc, novnc, xvfb, xdotool, chromium and the Python deps.
#
# To use a different noVNC port (e.g. if 6080 is taken on your host):
#   PHANTOM_NOVNC_PORT=6081 docker compose up -d

services:
  agent-zero:
    ports:
      - "${PHANTOM_NOVNC_PORT:-6080}:6080"
    volumes:
      - ./a0-data/usr/plugins/phantom_bridge:/a0/usr/plugins/phantom_bridge
